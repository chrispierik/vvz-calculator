services:
  vvz-calculator:
    image: vvz-calculator:latest
    container_name: vvz-calculator
    restart: unless-stopped
    ports:
      - "5000:8501"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
